<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PieceTrack — Diagnostic</title>
<style>
  body { font-family: monospace; background: #1A1F2E; color: #E2E8F0; padding: 20px; max-width: 700px; margin: 0 auto; }
  h2 { color: #F6C90E; margin-bottom: 20px; }
  input { width: 100%; padding: 10px; background: #252B3B; border: 1px solid #2D3748; border-radius: 6px; color: #E2E8F0; font-family: monospace; font-size: 13px; box-sizing: border-box; margin-bottom: 12px; }
  button { width: 100%; padding: 12px; background: #F6C90E; color: #1A1F2E; border: none; border-radius: 6px; font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 8px; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .result-box { background: #0d1117; border: 1px solid #2D3748; border-radius: 8px; padding: 16px; margin-top: 16px; min-height: 80px; font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
  .ok   { color: #38A169; }
  .err  { color: #E53E3E; }
  .info { color: #4299E1; }
  .warn { color: #F6C90E; }
  label { font-size: 11px; color: #718096; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px; }
  .step { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px; font-size: 13px; color: #718096; }
  .step .num { background: #F6C90E; color: #1A1F2E; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; flex-shrink: 0; }
</style>
</head>
<body>

<h2>🔧 PieceTrack — Diagnostic Sheets</h2>

<div class="step"><div class="num">1</div><div>Colle ton URL Apps Script ci-dessous</div></div>
<div>
  <label>URL Google Apps Script Web App</label>
  <input type="text" id="url" placeholder="https://script.google.com/macros/s/..." />
</div>

<div class="step"><div class="num">2</div><div>Lance les tests dans l'ordre</div></div>

<button onclick="testGet()">🔍 TEST 1 — Vérifier GET (lecture)</button>
<button onclick="testPost()">📝 TEST 2 — Vérifier POST sans photo</button>
<button onclick="testPostWithPhoto()">🖼 TEST 3 — Vérifier POST avec photo test</button>
<button onclick="clearResult()" style="background:#252B3B;color:#718096;border:1px solid #2D3748;">🗑 Effacer les résultats</button>

<div class="result-box" id="result">Les résultats apparaîtront ici…</div>

<script>
function getUrl() {
  const u = document.getElementById('url').value.trim();
  if (!u) { log('err', '⚠️ Colle d\'abord ton URL Apps Script !'); return null; }
  return u;
}

function log(type, msg) {
  const box = document.getElementById('result');
  const time = new Date().toLocaleTimeString('fr-FR');
  box.innerHTML += `<span class="${type}">[${time}] ${msg}</span>\n`;
  box.scrollTop = box.scrollHeight;
}

function clearResult() {
  document.getElementById('result').innerHTML = '';
}

// ─── TEST 1 : GET ──────────────────────────────────────────
async function testGet() {
  const url = getUrl(); if (!url) return;
  clearResult();
  log('info', '▶ TEST 1 — Envoi GET vers Apps Script...');
  try {
    const res = await fetch(url + '?ping=1', { redirect: 'follow' });
    log('info', `→ HTTP Status: ${res.status} ${res.statusText}`);
    const text = await res.text();
    log('info', `→ Réponse brute (200 premiers chars): ${text.substring(0, 200)}`);
    try {
      const json = JSON.parse(text);
      if (json.status === 'ok') {
        log('ok', `✅ GET fonctionne ! Sheets accessible.`);
        log('ok', `   Lignes trouvées: ${json.rows ? json.rows.length : 0}`);
      } else {
        log('err', `❌ Le script répond mais avec une erreur: ${json.message || JSON.stringify(json)}`);
      }
    } catch {
      log('warn', '⚠️ La réponse n\'est pas du JSON valide — vérifier le déploiement.');
    }
  } catch (err) {
    log('err', `❌ Erreur réseau: ${err.message}`);
    log('warn', '   → Cause possible: CORS, URL incorrecte, ou déploiement non publié.');
  }
}

// ─── TEST 2 : POST sans photo ───────────────────────────────
async function testPost() {
  const url = getUrl(); if (!url) return;
  clearResult();
  log('info', '▶ TEST 2 — Envoi POST sans photo...');
  
  const payload = [{
    id: Date.now(),
    date: new Date().toISOString(),
    piece: 'DIAG-001',
    package: 'PKG-DIAG',
    location: 'canopy',
    zone: 'A1',
    comment: 'Test diagnostic — peut être supprimé',
    photoB64: null
  }];

  log('info', `→ Payload envoyé: ${JSON.stringify(payload).substring(0, 200)}`);

  try {
    const res = await fetch(url, {
      method: 'POST',
      body: JSON.stringify(payload),
      headers: { 'Content-Type': 'text/plain' }
      // Pas de mode:'no-cors' pour pouvoir lire la réponse
    });
    log('info', `→ HTTP Status: ${res.status} ${res.statusText}`);
    const text = await res.text();
    log('info', `→ Réponse brute: ${text.substring(0, 500)}`);
    try {
      const json = JSON.parse(text);
      if (json.status === 'ok') {
        log('ok', `✅ POST fonctionne ! ${json.count} ligne(s) écrite(s).`);
        if (json.log) {
          log('info', `→ Log serveur:`);
          log('info', JSON.stringify(json.log, null, 2));
        }
        if (json.results) {
          json.results.forEach(r => log('ok', `   📄 id:${r.id} → sheet:${r.sheet} | photo:${r.photoUrl || 'aucune'}`));
        }
      } else {
        log('err', `❌ Erreur serveur: ${json.message}`);
        if (json.log) log('warn', `→ Log: ${JSON.stringify(json.log, null, 2)}`);
      }
    } catch {
      log('warn', '⚠️ Réponse non-JSON. Probablement une erreur de déploiement ou CORS.');
      log('info', `Réponse complète: ${text}`);
    }
  } catch (err) {
    log('err', `❌ Erreur fetch: ${err.message}`);
    if (err.message.includes('CORS') || err.message.includes('cors')) {
      log('warn', '→ CORS bloqué — le script n\'est pas déployé en accès "Tout le monde".');
    }
  }
}

// ─── TEST 3 : POST avec petite photo en base64 ─────────────
async function testPostWithPhoto() {
  const url = getUrl(); if (!url) return;
  clearResult();
  log('info', '▶ TEST 3 — Envoi POST avec photo test (1x1 pixel JPEG)...');

  // JPEG minimal 1x1 pixel rouge encodé en base64
  const tinyJpeg = '/9j/4AAQSkZJRgABAQEASABIAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAABAAEDASIAAhEBAxEB/8QAFAABAAAAAAAAAAAAAAAAAAAACf/EABQQAQAAAAAAAAAAAAAAAAAAAAD/xAAUAQEAAAAAAAAAAAAAAAAAAAAA/8QAFBEBAAAAAAAAAAAAAAAAAAAAAP/aAAwDAQACEQMRAD8AJQAB/9k=';

  const payload = [{
    id: Date.now(),
    date: new Date().toISOString(),
    piece: 'DIAG-PHOTO',
    package: 'PKG-DIAG',
    location: 'outside',
    zone: 'A1',
    comment: 'Test photo diagnostic',
    photoB64: tinyJpeg
  }];

  try {
    const res = await fetch(url, {
      method: 'POST',
      body: JSON.stringify(payload),
      headers: { 'Content-Type': 'text/plain' }
    });
    log('info', `→ HTTP Status: ${res.status}`);
    const text = await res.text();
    const json = JSON.parse(text);
    if (json.status === 'ok') {
      log('ok', `✅ POST avec photo fonctionne !`);
      json.results?.forEach(r => {
        if (r.photoUrl && r.photoUrl !== 'upload-failed') {
          log('ok', `   📸 Photo uploadée: ${r.photoUrl}`);
        } else {
          log('warn', `   ⚠️ Photo: ${r.photoUrl}`);
        }
      });
    } else {
      log('err', `❌ Erreur: ${json.message}`);
      if (json.log) log('warn', JSON.stringify(json.log, null, 2));
    }
  } catch (err) {
    log('err', `❌ ${err.message}`);
  }
}
</script>
</body>
</html>
