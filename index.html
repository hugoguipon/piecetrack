<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PieceTrack — Diagnostic</title>
<style>
  body { font-family: monospace; background: #1A1F2E; color: #E2E8F0; padding: 20px; max-width: 700px; margin: 0 auto; }
  h2 { color: #F6C90E; margin-bottom: 20px; }
  input { width: 100%; padding: 10px; background: #252B3B; border: 1px solid #2D3748; border-radius: 6px; color: #E2E8F0; font-family: monospace; font-size: 13px; box-sizing: border-box; margin-bottom: 12px; }
  button { width: 100%; padding: 12px; background: #F6C90E; color: #1A1F2E; border: none; border-radius: 6px; font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 8px; }
  button.secondary { background: #252B3B; color: #718096; border: 1px solid #2D3748; }
  .result-box { background: #0d1117; border: 1px solid #2D3748; border-radius: 8px; padding: 16px; margin-top: 16px; min-height: 80px; font-size: 12px; line-height: 1.8; white-space: pre-wrap; word-break: break-all; }
  .ok   { color: #38A169; }
  .err  { color: #E53E3E; }
  .info { color: #4299E1; }
  .warn { color: #F6C90E; }
  label { font-size: 11px; color: #718096; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px; }
  .sep { border-top: 1px solid #2D3748; margin: 12px 0; }
</style>
</head>
<body>

<h2>🔧 PieceTrack — Diagnostic Sheets</h2>

<label>URL Google Apps Script Web App</label>
<input type="text" id="url" placeholder="https://script.google.com/macros/s/..." />

<button onclick="testGet()">🔍 TEST 1 — Lecture GET (vérifie la connexion)</button>
<button onclick="testPost()">📝 TEST 2 — Écriture POST + vérification</button>
<button onclick="clearResult()" class="secondary">🗑 Effacer</button>

<div class="result-box" id="result">Les résultats apparaîtront ici…</div>

<script>
const TEST_ID = 'DIAG-' + Date.now();

function getUrl() {
  const u = document.getElementById('url').value.trim();
  if (!u) { log('err', '⚠️ Colle d\'abord ton URL Apps Script !'); return null; }
  return u;
}

function log(type, msg) {
  const box = document.getElementById('result');
  const time = new Date().toLocaleTimeString('fr-FR');
  box.innerHTML += `<span class="${type}">[${time}] ${msg}</span>\n`;
  box.scrollTop = box.scrollHeight;
}

function clearResult() {
  document.getElementById('result').innerHTML = '';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── TEST 1 : GET ─────────────────────────────────────────
async function testGet() {
  const url = getUrl(); if (!url) return;
  clearResult();
  log('info', '▶ TEST 1 — Envoi GET...');
  try {
    const res = await fetch(url + '?ping=1', { redirect: 'follow' });
    log('info', `→ HTTP Status: ${res.status}`);
    const text = await res.text();
    log('info', `→ Réponse: ${text.substring(0, 300)}`);
    try {
      const json = JSON.parse(text);
      if (json.status === 'ok') {
        log('ok', `✅ GET fonctionne ! Connexion au sheet OK.`);
        log('ok', `   Lignes trouvées: ${json.rows ? json.rows.length : 0}`);
      } else {
        log('err', `❌ Erreur script: ${json.message}`);
      }
    } catch {
      log('warn', '⚠️ Réponse non-JSON — vérifier le déploiement.');
    }
  } catch (err) {
    log('err', `❌ Erreur: ${err.message}`);
  }
}

// ─── TEST 2 : POST + vérification via GET ─────────────────
async function testPost() {
  const url = getUrl(); if (!url) return;
  clearResult();

  const testPiece = 'DIAG-TEST';
  const testPkg   = 'PKG-DIAG';

  log('info', '▶ TEST 2 — Envoi POST avec no-cors...');
  log('info', `   piece="${testPiece}" package="${testPkg}" location="canopy"`);

  const payload = [{
    id: Date.now(),
    date: new Date().toISOString(),
    piece: testPiece,
    package: testPkg,
    location: 'canopy',
    zone: 'A1',
    comment: 'Ligne de diagnostic — peut être supprimée',
    photoB64: null
  }];

  try {
    // POST en no-cors (obligatoire avec Apps Script)
    await fetch(url, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(payload),
      headers: { 'Content-Type': 'text/plain' }
    });
    log('ok', '✅ POST envoyé (no-cors — réponse non lisible, normal)');
  } catch (err) {
    log('err', `❌ POST échoué: ${err.message}`);
    return;
  }

  // Attendre 4 secondes que Apps Script traite la requête
  log('info', '⏳ Attente 4 secondes que Apps Script traite...');
  await sleep(4000);

  // Vérifier via GET si la ligne est apparue dans le sheet
  log('info', '🔍 Vérification via GET — cherche la ligne dans le sheet...');
  try {
    const checkUrl = `${url}?piece=${encodeURIComponent(testPiece)}&package=${encodeURIComponent(testPkg)}`;
    const res = await fetch(checkUrl, { redirect: 'follow' });
    const text = await res.text();
    const json = JSON.parse(text);

    if (json.status === 'ok') {
      const found = json.rows && json.rows.length > 0;
      if (found) {
        log('ok', `✅✅ SUCCÈS ! La ligne a bien été écrite dans le sheet !`);
        log('ok', `   → ${json.rows.length} ligne(s) trouvée(s) avec piece="${testPiece}"`);
        log('ok', `   → Sheet: ${json.rows[0]._sheet || '?'}`);
        log('ok', `   → Zone: ${json.rows[0]['Zone'] || '?'}`);
        log('info', '');
        log('info', '🎉 Ton Apps Script fonctionne correctement !');
        log('info', '   Tu peux supprimer la ligne DIAG-TEST dans le sheet.');
      } else {
        log('err', `❌ La ligne n'a PAS été écrite dans le sheet.`);
        log('warn', `→ Le POST est parti mais Apps Script n'a rien écrit.`);
        log('warn', `→ Vérifie les logs dans Apps Script → Exécutions.`);
        log('warn', `→ L'ID dans getSpreadsheet() est-il correct ?`);
      }
    } else {
      log('err', `❌ Erreur lors de la vérification: ${json.message}`);
    }
  } catch (err) {
    log('err', `❌ Vérification impossible: ${err.message}`);
  }
}
</script>
</body>
</html>
